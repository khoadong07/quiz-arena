services:
  # ── Node API + WebSocket server ─────────────────────────
  server:
    build:
      context: server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx – static SPA with gzip/brotli caching ─────────
  client:
    build:
      context: client
      dockerfile: Dockerfile
    ports:
      - "18009:80"
    restart: unless-stopped
    depends_on:
      - server
