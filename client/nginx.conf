server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Brotli/Gzip pre-compressed assets ──────────────────
    gzip_static on;

    # ── Dynamic gzip for anything not pre-compressed ────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css text/xml application/json
                    application/javascript application/xml+rss
                    application/atom+xml image/svg+xml;

    # ── Long-lived cache for hashed assets ──────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Audio files: medium cache ─────────────────────────
    location ~* \.(mp3|ogg|wav)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Images: medium cache ──────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Proxy socket.io to the server ──────────────────────
    location /socket.io/ {
        proxy_pass http://server:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400; # Keep connection alive
    }

    # ── Proxy uploads and upload endpoint ──────────────────
    location ^~ /uploads/ {
        proxy_pass http://server:3001/uploads/;
        proxy_set_header Host $host;
    }

    location /upload {
        proxy_pass http://server:3001/upload;
        proxy_set_header Host $host;
        client_max_body_size 10M;
    }

    # ── SPA fallback: no-cache index.html ────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
